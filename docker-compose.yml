version: "3.8"

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: pcshop_sql_server
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=PCShop@Dev123
    ports:
      - "1434:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql

  backend:
    build: ./backend
    container_name: pcshop_backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      - DB_SERVER=db
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: pcshop_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - backend

volumes:
  sqlserver_data:
